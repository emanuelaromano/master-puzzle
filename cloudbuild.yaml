steps:
  # Ensure Artifact Registry repo exists (otherwise push fails and no service is deployed)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe $$ARTIFACT_REPO --location=$$REGION --project=$$PROJECT_ID 2>/dev/null || \
        gcloud artifacts repositories create $$ARTIFACT_REPO --repository-format=docker --location=$$REGION --project=$$PROJECT_ID --description="Cloud Run images"
    env:
      - REGION=$_REGION
      - PROJECT_ID=$PROJECT_ID
      - ARTIFACT_REPO=$_ARTIFACT_REPO
    id: ensure-repo

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform=linux/amd64
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:$BUILD_ID
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:latest
      - .
    id: build

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:$BUILD_ID
    id: push

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:$BUILD_ID
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --project=$PROJECT_ID
    id: deploy

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:$BUILD_ID
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:latest

substitutions:
  _REGION: us-central1
  _ARTIFACT_REPO: cloud-run-source-deploy
  _SERVICE_NAME: master-puzzle
